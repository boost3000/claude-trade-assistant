<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180" role="img" aria-label="boost3000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#080d15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#0c1a2c"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bcc8d6"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.4" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </radialGradient>
    <clipPath id="cardClip">
      <rect x="3" y="3" width="634" height="174" rx="26"/>
    </clipPath>
    <clipPath id="badgeClip">
      <rect x="96" y="26" width="128" height="128" rx="30"/>
    </clipPath>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect x="3" y="3" width="634" height="174" rx="26" fill="url(#bg)" stroke="url(#edge)" stroke-width="1.5"/>

  <!-- background candlestick chart, generated from a continuous OHLC series -->
  <g clip-path="url(#cardClip)" opacity="0.22">
    <g stroke="#22c55e" fill="#22c55e">
      <line x1="11.6" y1="108.8" x2="11.6" y2="122.2" stroke-width="1.1"/><rect x="5.0" y="114.2" width="13.1" height="3.5"/>
      <line x1="50.9" y1="113.1" x2="50.9" y2="129.2" stroke-width="1.1"/><rect x="44.4" y="115.9" width="13.1" height="9.2"/>
      <line x1="77.2" y1="120.3" x2="77.2" y2="146.9" stroke-width="1.1"/><rect x="70.6" y="127.7" width="13.1" height="8.8"/>
      <line x1="90.3" y1="98.2" x2="90.3" y2="136.6" stroke-width="1.1"/><rect x="83.8" y="108.9" width="13.1" height="18.8"/>
      <line x1="116.6" y1="106.1" x2="116.6" y2="122.0" stroke-width="1.1"/><rect x="110.0" y="111.9" width="13.1" height="4.3"/>
      <line x1="142.8" y1="93.7" x2="142.8" y2="123.8" stroke-width="1.1"/><rect x="136.2" y="101.2" width="13.1" height="17.9"/>
      <line x1="155.9" y1="79.0" x2="155.9" y2="108.2" stroke-width="1.1"/><rect x="149.4" y="85.9" width="13.1" height="15.3"/>
      <line x1="169.1" y1="76.2" x2="169.1" y2="94.6" stroke-width="1.1"/><rect x="162.5" y="79.8" width="13.1" height="6.1"/>
      <line x1="221.6" y1="94.6" x2="221.6" y2="106.9" stroke-width="1.1"/><rect x="215.0" y="99.0" width="13.1" height="3.5"/>
      <line x1="247.8" y1="45.2" x2="247.8" y2="113.9" stroke-width="1.1"/><rect x="241.2" y="70.6" width="13.1" height="33.3"/>
      <line x1="274.1" y1="64.3" x2="274.1" y2="82.4" stroke-width="1.1"/><rect x="267.5" y="71.3" width="13.1" height="7.6"/>
      <line x1="287.2" y1="59.7" x2="287.2" y2="76.9" stroke-width="1.1"/><rect x="280.6" y="64.8" width="13.1" height="6.5"/>
      <line x1="365.9" y1="81.8" x2="365.9" y2="121.4" stroke-width="1.1"/><rect x="359.4" y="93.2" width="13.1" height="13.1"/>
      <line x1="379.1" y1="85.8" x2="379.1" y2="97.0" stroke-width="1.1"/><rect x="372.5" y="90.7" width="13.1" height="2.5"/>
      <line x1="392.2" y1="77.6" x2="392.2" y2="100.9" stroke-width="1.1"/><rect x="385.6" y="83.6" width="13.1" height="7.2"/>
      <line x1="405.3" y1="62.1" x2="405.3" y2="95.3" stroke-width="1.1"/><rect x="398.8" y="72.3" width="13.1" height="11.3"/>
      <line x1="431.6" y1="56.5" x2="431.6" y2="82.4" stroke-width="1.1"/><rect x="425.0" y="68.8" width="13.1" height="10.4"/>
      <line x1="457.8" y1="62.4" x2="457.8" y2="72.5" stroke-width="1.1"/><rect x="451.2" y="66.4" width="13.1" height="3.2"/>
      <line x1="470.9" y1="43.1" x2="470.9" y2="74.5" stroke-width="1.1"/><rect x="464.4" y="52.9" width="13.1" height="13.5"/>
      <line x1="510.3" y1="49.1" x2="510.3" y2="64.7" stroke-width="1.1"/><rect x="503.8" y="56.9" width="13.1" height="4.7"/>
      <line x1="536.6" y1="63.1" x2="536.6" y2="68.6" stroke-width="1.1"/><rect x="530.0" y="65.3" width="13.1" height="1.4"/>
      <line x1="562.8" y1="37.0" x2="562.8" y2="70.1" stroke-width="1.1"/><rect x="556.2" y="48.2" width="13.1" height="17.8"/>
      <line x1="575.9" y1="41.3" x2="575.9" y2="53.0" stroke-width="1.1"/><rect x="569.4" y="44.1" width="13.1" height="4.0"/>
      <line x1="589.1" y1="33.1" x2="589.1" y2="52.2" stroke-width="1.1"/><rect x="582.5" y="38.7" width="13.1" height="5.4"/>
      <line x1="615.3" y1="12.0" x2="615.3" y2="64.3" stroke-width="1.1"/><rect x="608.8" y="29.2" width="13.1" height="16.4"/>
      <line x1="628.4" y1="21.1" x2="628.4" y2="35.0" stroke-width="1.1"/><rect x="621.9" y="25.3" width="13.1" height="3.8"/>
    </g>
    <g stroke="#ef4444" fill="#ef4444">
      <line x1="24.7" y1="108.3" x2="24.7" y2="121.0" stroke-width="1.1"/><rect x="18.1" y="114.2" width="13.1" height="4.1"/>
      <line x1="37.8" y1="114.2" x2="37.8" y2="135.2" stroke-width="1.1"/><rect x="31.2" y="118.3" width="13.1" height="6.7"/>
      <line x1="64.1" y1="102.9" x2="64.1" y2="152.0" stroke-width="1.1"/><rect x="57.5" y="115.9" width="13.1" height="20.7"/>
      <line x1="103.4" y1="100.6" x2="103.4" y2="125.2" stroke-width="1.1"/><rect x="96.9" y="108.9" width="13.1" height="7.3"/>
      <line x1="129.7" y1="106.1" x2="129.7" y2="123.3" stroke-width="1.1"/><rect x="123.1" y="111.9" width="13.1" height="7.2"/>
      <line x1="182.2" y1="78.1" x2="182.2" y2="84.3" stroke-width="1.1"/><rect x="175.6" y="79.8" width="13.1" height="1.4"/>
      <line x1="195.3" y1="76.8" x2="195.3" y2="92.8" stroke-width="1.1"/><rect x="188.8" y="80.5" width="13.1" height="6.5"/>
      <line x1="208.4" y1="79.0" x2="208.4" y2="112.3" stroke-width="1.1"/><rect x="201.9" y="87.0" width="13.1" height="15.5"/>
      <line x1="234.7" y1="94.1" x2="234.7" y2="109.1" stroke-width="1.1"/><rect x="228.1" y="99.0" width="13.1" height="4.9"/>
      <line x1="260.9" y1="63.1" x2="260.9" y2="87.3" stroke-width="1.1"/><rect x="254.4" y="70.6" width="13.1" height="8.2"/>
      <line x1="300.3" y1="60.6" x2="300.3" y2="84.2" stroke-width="1.1"/><rect x="293.8" y="64.8" width="13.1" height="10.8"/>
      <line x1="313.4" y1="66.7" x2="313.4" y2="87.9" stroke-width="1.1"/><rect x="306.9" y="75.5" width="13.1" height="5.6"/>
      <line x1="326.6" y1="71.7" x2="326.6" y2="102.4" stroke-width="1.1"/><rect x="320.0" y="81.1" width="13.1" height="9.4"/>
      <line x1="339.7" y1="81.6" x2="339.7" y2="109.5" stroke-width="1.1"/><rect x="333.1" y="90.5" width="13.1" height="8.7"/>
      <line x1="352.8" y1="89.7" x2="352.8" y2="114.6" stroke-width="1.1"/><rect x="346.2" y="99.2" width="13.1" height="7.2"/>
      <line x1="418.4" y1="66.9" x2="418.4" y2="83.8" stroke-width="1.1"/><rect x="411.9" y="72.3" width="13.1" height="6.9"/>
      <line x1="444.7" y1="67.2" x2="444.7" y2="73.6" stroke-width="1.1"/><rect x="438.1" y="68.8" width="13.1" height="1.4"/>
      <line x1="484.1" y1="44.9" x2="484.1" y2="66.4" stroke-width="1.1"/><rect x="477.5" y="52.9" width="13.1" height="5.4"/>
      <line x1="497.2" y1="55.7" x2="497.2" y2="65.8" stroke-width="1.1"/><rect x="490.6" y="58.4" width="13.1" height="3.2"/>
      <line x1="523.4" y1="49.7" x2="523.4" y2="71.2" stroke-width="1.1"/><rect x="516.9" y="56.9" width="13.1" height="8.4"/>
      <line x1="549.7" y1="62.7" x2="549.7" y2="69.2" stroke-width="1.1"/><rect x="543.1" y="65.3" width="13.1" height="1.4"/>
      <line x1="602.2" y1="34.1" x2="602.2" y2="52.3" stroke-width="1.1"/><rect x="595.6" y="38.7" width="13.1" height="6.8"/>
    </g>
  </g>

  <!-- top sheen -->
  <rect x="3" y="3" width="634" height="58" rx="26" fill="#ffffff" opacity="0.03"/>

  <!-- badge -->
  <rect x="96" y="26" width="128" height="128" rx="30" fill="#0a1320" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- space scene (origin at badge centre, scaled up to fill the larger badge) -->
  <g clip-path="url(#badgeClip)">
    <g transform="translate(160,90) scale(1.23)">
      <!-- stars, spread evenly across the badge -->
      <circle cx="-42" cy="-36" r="1.5" fill="#e2e8f0" opacity="0.85"/>
      <circle cx="-6"  cy="-42" r="1.2" fill="#e2e8f0" opacity="0.8"/>
      <circle cx="18"  cy="-34" r="1.1" fill="#e2e8f0" opacity="0.7"/>
      <circle cx="46"  cy="-42" r="1.2" fill="#e2e8f0" opacity="0.6"/>
      <circle cx="-48" cy="-6"  r="1.4" fill="#e2e8f0" opacity="0.75"/>
      <circle cx="-28" cy="-12" r="1.1" fill="#e2e8f0" opacity="0.6"/>
      <circle cx="16"  cy="-2"  r="1.2" fill="#e2e8f0" opacity="0.7"/>
      <circle cx="48"  cy="0"   r="1.3" fill="#e2e8f0" opacity="0.65"/>
      <circle cx="50"  cy="-18" r="1.1" fill="#e2e8f0" opacity="0.55"/>
      <circle cx="-20" cy="40"  r="1.3" fill="#e2e8f0" opacity="0.6"/>
      <circle cx="6"   cy="30"  r="1.1" fill="#e2e8f0" opacity="0.6"/>
      <circle cx="22"  cy="20"  r="1.0" fill="#e2e8f0" opacity="0.5"/>
      <circle cx="44"  cy="20"  r="1.2" fill="#e2e8f0" opacity="0.55"/>
      <path d="M-30,-44 l1.6,4 4,1.6 -4,1.6 -1.6,4 -1.6,-4 -4,-1.6 4,-1.6 Z" fill="#fde68a" opacity="0.9"/>
      <path d="M38,30 l1.3,3.2 3.2,1.3 -3.2,1.3 -1.3,3.2 -1.3,-3.2 -3.2,-1.3 3.2,-1.3 Z" fill="#fde68a" opacity="0.8"/>

      <!-- moon (darker craters) -->
      <circle cx="30" cy="-30" r="14" fill="url(#moon)"/>
      <circle cx="33" cy="-34" r="2.6" fill="#7e8ba0" opacity="0.85"/>
      <circle cx="25" cy="-27" r="2" fill="#7e8ba0" opacity="0.8"/>
      <circle cx="34" cy="-24" r="1.6" fill="#7e8ba0" opacity="0.8"/>

      <!-- exhaust puffs (trailing lower-left) -->
      <circle cx="-34" cy="33" r="3.2" fill="#fbbf24" opacity="0.35"/>
      <circle cx="-41" cy="40" r="2.2" fill="#fbbf24" opacity="0.22"/>
      <circle cx="-47" cy="46" r="1.4" fill="#fbbf24" opacity="0.15"/>

      <!-- rocket: drawn nose-up, tilted 45 to aim up-right at the moon -->
      <g transform="translate(-8,6) rotate(45)">
        <g filter="url(#glow)">
          <path d="M-7,17 Q-9,31 0,41 Q9,31 7,17 Z" fill="url(#flame)"/>
          <path d="M-3.5,18 Q-4,27 0,34 Q4,27 3.5,18 Z" fill="#fff7ed"/>
        </g>
        <path d="M-10,4 L-21,19 L-10,14 Z" fill="#2dd4bf"/>
        <path d="M10,4 L21,19 L10,14 Z" fill="#22d3ee"/>
        <path d="M-10,-12 L10,-12 L10,12 Q10,16 6,17 L-6,17 Q-10,16 -10,12 Z" fill="url(#body)"/>
        <path d="M0,-30 C5,-24 10,-19 10,-12 L-10,-12 C-10,-19 -5,-24 0,-30 Z" fill="url(#accent)"/>
        <!-- rising-chart screen painted on the hull -->
        <rect x="-7" y="-5" width="14" height="13" rx="3" fill="#0f1b2d"/>
        <polyline points="-4,5 -1,1 2,3 5,-3" fill="none" stroke="url(#accent)"
                  stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5,-3 l-2.6,0 M5,-3 l0,2.6" fill="none" stroke="url(#accent)" stroke-width="1.6" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- wordmark -->
  <text x="250" y="110" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-1">
    <tspan fill="#f1f5f9">boost</tspan><tspan fill="url(#accent)">3000</tspan>
  </text>
</svg>
